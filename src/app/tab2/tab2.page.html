<ion-content class="tab2-page ion-padding">

  <!-- FLOATING EXERCISE EMOJIS -->
  <div class="floating-emoji emoji1">🏋️</div>
  <div class="floating-emoji emoji2">🔥</div>
  <div class="floating-emoji emoji3">💪</div>
  <div class="floating-emoji emoji4">⚡</div>

  <!-- HEADER -->
  <div class="header">

    <h1>🔥 Train Hard</h1>
    <p>No excuses. Only results.</p>

  </div>

  <!-- TOP ACTIONS -->
  <div class="top-actions">

    <ion-button
      color="danger"
      fill="outline"
      class="reset-btn"
      (click)="clearWorkouts()">

      Reset Workouts

    </ion-button>

  </div>

  <!-- CLICKABLE CATEGORY CAROUSEL -->
  <div class="category-scroll">

    <div
      class="category-chip"
      *ngFor="let c of categories"
      [class.active]="selectedCategory === c.name"
      (click)="selectedCategory = c.name">

      {{ c.emoji }} {{ c.name }}

    </div>

  </div>

  <!-- MAIN CATEGORY CARDS -->
  <div class="cards">

    <div
      class="exercise-card"
      *ngFor="let c of categories"
      (click)="openCategory(c.name)">

      <div class="glow"></div>

      <div class="content">

        <div class="emoji">
          {{ c.emoji }}
        </div>

        <h2>
          {{ c.name }}
        </h2>

        <p>
          🔥 5 Exercises • {{ c.level }}
        </p>

        <p>
          🎯 Reward: 5 Tokens
        </p>

        <p>
          ⚡ Avg Burn: 200 Calories
        </p>

        <ion-button
          expand="block"
          class="complete-btn">

          Start Workout →

        </ion-button>

      </div>

    </div>

  </div>

  <!-- FLOATING ADD WORKOUT BUTTON -->
  <ion-fab
    vertical="bottom"
    horizontal="end"
    slot="fixed">

    <ion-fab-button>
      +
    </ion-fab-button>

  </ion-fab>

</ion-content>
