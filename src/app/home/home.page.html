<ion-header>
  <ion-toolbar color="dark">
    <ion-title>Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div class="card">
    <h2>Login</h2>

    <ion-input placeholder="Username" [(ngModel)]="username"></ion-input>
    <ion-input type="password" placeholder="Password" [(ngModel)]="password"></ion-input>

    <ion-button expand="block" (click)="login()" routerLink="/tabs/tab1">Login</ion-button>
  </div>
  <ion-button expand="block" color="medium" (click)="register()">
  Register New User
</ion-button>

</ion-content>
