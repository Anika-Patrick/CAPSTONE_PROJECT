<ion-content class="bg">

  <!-- PROFILE CARD -->
  <div class="profile-card">

    <div class="avatar">💪</div>

    <h2>FitFreak User</h2>
    <p>Level: Beast Mode 🔥</p>

  </div>

  <!-- INFO SECTION -->
  <div class="info">

    <div class="box">
      <h3>🏃 Workouts</h3>
      <p>Cardio • Strength • Yoga</p>
    </div>

    <div class="box">
      <h3>⚡ Status</h3>
      <p>Active Member</p>
    </div>

    <div class="box">
      <h3>🏆 Achievements</h3>
      <p>Gold Runner Badge</p>
    </div>

  </div>

  <!-- LOGOUT BUTTON -->
  <div class="logout">
    <ion-button color="danger" expand="block" (click)="confirmLogout()">
      Logout
    </ion-button>
  </div>

</ion-content>
