<ion-content class="chat-page">

  <div class="chat-container">

    <div *ngFor="let msg of messages"
         class="message"
         [ngClass]="msg.sender">

      <div class="avatar">
        {{ msg.sender === 'user' ? '👤' : '🤖' }}
      </div>

      <div class="bubble">

        <div class="name">{{ msg.username }}</div>

        <div class="text">{{ msg.text }}</div>

        <div class="time">{{ msg.time }}</div>

      </div>

    </div>

  </div>

  <!-- INPUT -->
  <div class="chat-input">

    <input [(ngModel)]="userMsg"
           placeholder="Type message..."
           (keyup.enter)="sendMsg()" />

    <button (click)="sendMsg()">➤</button>

  </div>

  <!-- END CHAT -->
  <div class="end-chat">
    <button (click)="endChat()">End Chat</button>
  </div>

  <!-- RATING -->
  <div class="rating-modal" *ngIf="showRating">

    <div class="rating-box">

      <h3>Rate Fitness Coach</h3>

      <div class="stars">
        <span (click)="submitRating(1)">⭐</span>
        <span (click)="submitRating(2)">⭐</span>
        <span (click)="submitRating(3)">⭐</span>
        <span (click)="submitRating(4)">⭐</span>
        <span (click)="submitRating(5)">⭐</span>
      </div>

    </div>

  </div>

</ion-content>
